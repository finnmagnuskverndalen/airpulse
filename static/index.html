<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>airpulse</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#000;--s1:#0a0a0a;--s2:#111;
  --b1:#1a1a1a;--b2:#222;--b3:#333;
  --t0:#fff;--t1:#888;--t2:#444;
  --g:#00ff88;--r:#ff3355;--b:#4488ff;--a:#ffaa00;
}
html,body{height:100%;overflow:hidden;background:var(--bg)}
body{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--t0);display:grid;grid-template-columns:1fr 280px;grid-template-rows:40px 1fr 130px;height:100vh}

/* TOP */
#top{grid-column:1/3;background:var(--bg);border-bottom:1px solid var(--b1);display:flex;align-items:center;padding:0 20px;gap:20px}
.logo{font-size:12px;letter-spacing:0.3em;color:var(--t0);font-weight:400}
.logo b{color:var(--g);font-weight:400}
.vsep{width:1px;height:14px;background:var(--b2)}
.badge{font-size:8px;letter-spacing:0.16em;color:var(--t2);padding:3px 8px;border:1px solid var(--b1)}
.badge.on{color:var(--g);border-color:var(--g);animation:gp 2s infinite}
@keyframes gp{0%,100%{opacity:1}50%{opacity:0.5}}
.badge.off{color:var(--r);border-color:var(--r)}
.kv{display:flex;flex-direction:column;align-items:flex-end}
.kn{font-size:16px;font-weight:300;line-height:1;letter-spacing:-0.01em;transition:color 0.3s}
.kl{font-size:7px;letter-spacing:0.2em;color:var(--t2);margin-top:2px}
.sp{flex:1}

/* GRAPH */
#graph{background:var(--bg);position:relative;overflow:hidden;cursor:default}
svg{width:100%;height:100%}

/* node */
.node-g{cursor:pointer}
.node-g circle.body{transition:r 0.2s,fill 0.2s}
.node-g:hover circle.body{fill-opacity:0.3}
.node-g.selected circle.body{stroke-width:1.5}
.node-g circle.pulse{animation:np 2s ease-out infinite;transform-origin:center}
@keyframes np{0%{r:0;opacity:0.6}100%{r:40px;opacity:0}}
.node-lbl{font-size:9px;letter-spacing:0.06em;fill:var(--t1);pointer-events:none;transition:fill 0.2s}
.node-g:hover .node-lbl{fill:var(--t0)}
.node-g.selected .node-lbl{fill:var(--t0)}

/* edge */
.edge{opacity:0.15;transition:opacity 0.2s}
.edge.highlight{opacity:0.7}
.edge.deauth{stroke:var(--r);opacity:0.4;stroke-dasharray:3,3}

/* DETAIL PANEL */
#detail{background:var(--bg);border-left:1px solid var(--b1);display:flex;flex-direction:column;overflow:hidden}
#detail-empty{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;color:var(--t2);font-size:9px;letter-spacing:0.14em}
#detail-content{flex:1;overflow-y:auto;scrollbar-width:none;display:none}
#detail-content::-webkit-scrollbar{display:none}
.dp{padding:16px 16px 0}
.d-mac{font-size:10px;color:var(--t1);letter-spacing:0.06em;margin-bottom:4px}
.d-mfr{font-size:18px;font-weight:300;letter-spacing:-0.01em;line-height:1.2;margin-bottom:16px}
.d-row{display:flex;justify-content:space-between;align-items:baseline;padding:8px 0;border-bottom:1px solid var(--b1)}
.d-row:last-child{border-bottom:none}
.d-key{font-size:8px;letter-spacing:0.14em;color:var(--t2)}
.d-val{font-size:11px;color:var(--t0)}
.d-flag{margin:12px 16px;padding:8px 12px;border:1px solid var(--r);color:var(--r);font-size:8px;letter-spacing:0.12em;display:none}
.d-flag.show{display:block}
.d-section{padding:12px 16px 0;font-size:8px;letter-spacing:0.16em;color:var(--t2);border-top:1px solid var(--b1);margin-top:8px}
#detail-edges{padding:0 16px 16px}
.de-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--b1);font-size:9px}
.de-row:last-child{border-bottom:none}
.de-mac{color:var(--t1)}
.de-count{color:var(--t2)}

/* BOTTOM */
#bottom{grid-column:1/3;border-top:1px solid var(--b1);display:flex;flex-direction:column;background:var(--bg)}
.bh{padding:6px 20px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--b1);flex-shrink:0}
.bt{font-size:7px;letter-spacing:0.2em;color:var(--t2)}
.bfilter{font-size:8px;letter-spacing:0.12em;color:var(--t2);cursor:pointer;padding:2px 6px;border:1px solid transparent;transition:all 0.1s}
.bfilter:hover,.bfilter.active{color:var(--t0);border-color:var(--b2)}
#tw{overflow-y:auto;flex:1;scrollbar-width:none}
#tw::-webkit-scrollbar{display:none}
table{width:100%;border-collapse:collapse}
thead th{padding:4px 20px;text-align:left;font-size:7px;letter-spacing:0.14em;color:var(--t2);border-bottom:1px solid var(--b1);background:var(--bg);position:sticky;top:0}
tbody tr{border-bottom:1px solid var(--b1);cursor:pointer;transition:background 0.1s}
tbody tr:hover{background:var(--s1)}
tbody tr.sel{background:var(--s2)}
td{padding:4px 20px;color:var(--t1);font-size:9px;white-space:nowrap}
td.tm{color:var(--t0)}
.rbar{height:1px;background:var(--b2);width:32px;display:inline-block;vertical-align:middle;margin-right:5px;position:relative;top:-1px}
.rfill{position:absolute;top:0;left:0;height:100%}

/* FEED overlay */
#feed-overlay{position:fixed;bottom:130px;left:0;width:300px;pointer-events:none;z-index:20;padding:0 0 8px 20px}
.frow{font-size:9px;color:var(--t2);padding:1px 0;display:flex;gap:6px;letter-spacing:0.04em;transition:color 0.3s}
.frow.fresh{color:var(--t1)}
.fts{color:var(--b3);flex-shrink:0}
.ftag{font-size:7px;padding:0 3px;letter-spacing:0.08em}
.ft-deauth{color:var(--r)}
.ft-new{color:var(--g)}
.ft-probe{color:var(--a)}
.ft-data{color:var(--b)}

/* MODAL detail for alerts */
#analyst-bar{grid-column:1/3;display:none}
</style>
</head>
<body>

<div id="top">
  <div class="logo">AIR<b>PULSE</b></div>
  <div class="vsep"></div>
  <div class="badge off" id="conn-badge">OFFLINE</div>
  <div class="kv"><div class="kn" id="s-dev" style="color:var(--b)">0</div><div class="kl">DEVICES</div></div>
  <div class="kv"><div class="kn" id="s-pps" style="color:var(--g)">0</div><div class="kl">PKT/S</div></div>
  <div class="kv"><div class="kn" id="s-tot">0</div><div class="kl">TOTAL</div></div>
  <div class="sp"></div>
  <div class="kv"><div class="kn" id="s-up" style="color:var(--t2)">0s</div><div class="kl">UPTIME</div></div>
</div>

<div id="graph">
  <svg id="svg"></svg>
</div>

<div id="detail">
  <div id="detail-empty">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="1"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    <span>click a node</span>
  </div>
  <div id="detail-content">
    <div class="dp">
      <div class="d-mac" id="d-mac"></div>
      <div class="d-mfr" id="d-mfr"></div>
      <div class="d-row"><span class="d-key">TYPE</span><span class="d-val" id="d-type"></span></div>
      <div class="d-row"><span class="d-key">RSSI</span><span class="d-val" id="d-rssi"></span></div>
      <div class="d-row"><span class="d-key">FRAMES</span><span class="d-val" id="d-frames"></span></div>
      <div class="d-row"><span class="d-key">LAST SEEN</span><span class="d-val" id="d-seen"></span></div>
      <div class="d-row"><span class="d-key">CHANNEL</span><span class="d-val" id="d-ch">—</span></div>
    </div>
    <div class="d-flag" id="d-flag">ANOMALY DETECTED</div>
    <div class="d-section" id="d-edges-title">CONNECTIONS</div>
    <div id="detail-edges"></div>
    <div class="d-section" id="d-analyst-title" style="display:none">AI ANALYSIS</div>
    <div id="d-analyst" style="padding:8px 16px 16px;font-size:10px;line-height:1.6;color:var(--t1);display:none"></div>
  </div>
</div>

<div id="bottom">
  <div class="bh">
    <span class="bt">DEVICES</span>
    <span class="bfilter active" data-f="all" onclick="setFilter('all',this)">ALL</span>
    <span class="bfilter" data-f="Router" onclick="setFilter('Router',this)">ROUTER</span>
    <span class="bfilter" data-f="Phone" onclick="setFilter('Phone',this)">PHONE</span>
    <span class="bfilter" data-f="IoT" onclick="setFilter('IoT',this)">IOT</span>
    <span class="bfilter" data-f="flagged" onclick="setFilter('flagged',this)">FLAGGED</span>
  </div>
  <div id="tw">
    <table>
      <thead><tr><th>MAC</th><th>MANUFACTURER</th><th>TYPE</th><th>RSSI</th><th>FRAMES</th><th>AGO</th></tr></thead>
      <tbody id="dt"></tbody>
    </table>
  </div>
</div>

<div id="feed-overlay"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script>
const nc = t => ({'Router':'#4488ff','Phone':'#00ff88','Laptop':'#00ff88','IoT':'#ffaa00'}[t]||'#ff3355');
let nodes=[], links=[], selMac=null, filter='all', lastAnalysis='', edgeMap=new Map();

const svg = d3.select('#svg');
const gEl = svg.append('g');
const linkG = gEl.append('g').attr('class','links');
const nodeG = gEl.append('g').attr('class','nodes');

const W=()=>document.getElementById('graph').clientWidth;
const H=()=>document.getElementById('graph').clientHeight;

const sim = d3.forceSimulation()
  .force('link', d3.forceLink().id(d=>d.id).distance(100).strength(0.4))
  .force('charge', d3.forceManyBody().strength(-300))
  .force('center', d3.forceCenter(W()/2, H()/2))
  .force('collision', d3.forceCollide(d=>nodeR(d)+8));

svg.call(d3.zoom().scaleExtent([0.2,4]).on('zoom', e => gEl.attr('transform', e.transform)));

function nodeR(d){ return Math.max(5, Math.min(18, 5+Math.log2((d.frame_count||1)+1)*2)); }

let linkSel = linkG.selectAll('line');
let nodeSel = nodeG.selectAll('.node-g');

function buildGraph(){
  linkSel = linkSel.data(links, d=>d.source.id+'-'+d.target.id)
    .join('line')
    .attr('class', d=>'edge'+(d.value>10?' deauth':''))
    .attr('stroke', d=>d.value>10?'#ff3355':'#444')
    .attr('stroke-width', d=>Math.min(2, 0.5+Math.log2((d.value||1)+1)*0.2));

  nodeSel = nodeSel.data(nodes, d=>d.id)
    .join(enter=>{
      const g=enter.append('g').attr('class','node-g')
        .call(d3.drag()
          .on('start',(e,d)=>{if(!e.active)sim.alphaTarget(0.3).restart();d.fx=d.x;d.fy=d.y;})
          .on('drag',(e,d)=>{d.fx=e.x;d.fy=e.y;})
          .on('end',(e,d)=>{if(!e.active)sim.alphaTarget(0);d.fx=null;d.fy=null;}))
        .on('click',(e,d)=>{e.stopPropagation();selectNode(d);});
      g.append('circle').attr('class','pulse').attr('fill','none');
      g.append('circle').attr('class','body');
      g.append('text').attr('class','node-lbl').attr('text-anchor','middle').attr('font-family','JetBrains Mono,monospace');
      return g;
    });

  nodeSel.select('circle.pulse')
    .attr('stroke', d=>nc(d.device_type||'?'))
    .attr('stroke-width', '0.5');

  nodeSel.select('circle.body')
    .attr('r', d=>nodeR(d))
    .attr('fill', d=>nc(d.device_type||'?')+'1a')
    .attr('stroke', d=>d.flagged?'#ff3355':nc(d.device_type||'?'))
    .attr('stroke-width', d=>d.flagged?1.5:0.8);

  nodeSel.select('text.node-lbl')
    .attr('dy', d=>nodeR(d)+12)
    .attr('font-size', '8')
    .text(d=>d.manufacturer==='Unknown'?d.mac.slice(-5):d.manufacturer.slice(0,12));

  nodeSel.classed('selected', d=>d.mac===selMac);
  highlightEdges();

  sim.nodes(nodes);
  sim.force('link').links(links);
  sim.alpha(0.08).restart();

  sim.on('tick',()=>{
    linkSel.attr('x1',d=>d.source.x).attr('y1',d=>d.source.y)
           .attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);
    nodeSel.attr('transform',d=>`translate(${d.x||0},${d.y||0})`);
  });
}

function highlightEdges(){
  if(!selMac){ linkSel.classed('highlight',false); return; }
  linkSel.classed('highlight', d=>(d.source.id||d.source)===selMac||(d.target.id||d.target)===selMac);
}

function selectNode(d){
  selMac = d.mac;
  nodeSel.classed('selected', n=>n.mac===selMac);
  highlightEdges();
  showDetail(d);
  highlightRow(d.mac);
}

function showDetail(d){
  document.getElementById('detail-empty').style.display='none';
  const dc=document.getElementById('detail-content');
  dc.style.display='block';
  document.getElementById('d-mac').textContent=d.mac;
  document.getElementById('d-mfr').textContent=d.manufacturer||'Unknown';
  document.getElementById('d-mfr').style.color=nc(d.device_type||'?');
  document.getElementById('d-type').textContent=d.device_type||'Unknown';
  document.getElementById('d-type').style.color=nc(d.device_type||'?');
  document.getElementById('d-rssi').textContent=(d.rssi||0)+' dBm';
  const rssiColor=(d.rssi||0)>-60?'#00ff88':(d.rssi||0)>-75?'#ffaa00':'#ff3355';
  document.getElementById('d-rssi').style.color=rssiColor;
  document.getElementById('d-frames').textContent=(d.frame_count||0).toLocaleString();
  document.getElementById('d-seen').textContent=(d.last_seen||0)===0?'now':(d.last_seen||0)+'s ago';
  const flag=document.getElementById('d-flag');
  if(d.flagged){flag.classList.add('show');flag.textContent='⚑ ANOMALY DETECTED';}
  else flag.classList.remove('show');

  const conns=links.filter(l=>(l.source.id||l.source)===d.mac||(l.target.id||l.target)===d.mac)
    .map(l=>{
      const other=(l.source.id||l.source)===d.mac?(l.target.id||l.target):(l.source.id||l.source);
      return {mac:other, count:l.value||0};
    }).sort((a,b)=>b.count-a.count).slice(0,8);

  document.getElementById('detail-edges').innerHTML=conns.map(c=>{
    const n=nodes.find(x=>x.mac===c.mac);
    const label=n&&n.manufacturer!=='Unknown'?n.manufacturer.slice(0,16):c.mac.slice(-8);
    return `<div class="de-row"><span class="de-mac">${label}</span><span class="de-count">${c.count} frames</span></div>`;
  }).join('');

  if(lastAnalysis){
    document.getElementById('d-analyst-title').style.display='';
    const da=document.getElementById('d-analyst');
    da.style.display='';
    da.textContent=lastAnalysis;
  }
}

svg.on('click',()=>{
  selMac=null;
  nodeSel.classed('selected',false);
  highlightEdges();
  document.getElementById('detail-empty').style.display='flex';
  document.getElementById('detail-content').style.display='none';
  document.querySelectorAll('#dt tr.sel').forEach(r=>r.classList.remove('sel'));
});

function highlightRow(mac){
  document.querySelectorAll('#dt tr').forEach(r=>{
    r.classList.toggle('sel', r.dataset.mac===mac);
  });
}

let tableFilter='all';
function setFilter(f, el){
  tableFilter=f;
  document.querySelectorAll('.bfilter').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  rebuildTable();
}
window.setFilter=setFilter;

function rebuildTable(){
  let rows=nodes.filter(d=>{
    if(tableFilter==='all') return true;
    if(tableFilter==='flagged') return d.flagged;
    return d.device_type===tableFilter;
  }).sort((a,b)=>(b.frame_count||0)-(a.frame_count||0)).slice(0,100);

  document.getElementById('dt').innerHTML=rows.map(d=>{
    const pct=Math.min(100,Math.max(0,((d.rssi||0)+100)*2));
    const rc=(d.rssi||0)>-60?'#00ff88':(d.rssi||0)>-75?'#ffaa00':'#ff3355';
    return `<tr data-mac="${d.mac}" class="${d.mac===selMac?'sel':''}" onclick="clickRow('${d.mac}')">
      <td class="tm">${d.mac}</td>
      <td>${d.manufacturer||'Unknown'}</td>
      <td style="color:${nc(d.device_type||'?')}">${d.device_type||'?'}</td>
      <td><div class="rbar"><div class="rfill" style="width:${pct*0.5}%;background:${rc}"></div></div>${d.rssi||0}</td>
      <td>${(d.frame_count||0).toLocaleString()}</td>
      <td>${(d.last_seen||0)===0?'now':(d.last_seen||0)+'s'}</td>
    </tr>`;
  }).join('');
}

window.clickRow=function(mac){
  const d=nodes.find(n=>n.mac===mac);
  if(d) selectNode(d);
};

let feedBuffer=[];
function pushFeed(events){
  const now=new Date().toTimeString().slice(0,8);
  events.slice(0,5).forEach(e=>{
    let c='',t='';
    if(/deauth|DEAUTH/.test(e)){c='deauth';t='DEAUTH';}
    else if(/new/.test(e)){c='new';t='NEW';}
    else if(/probe/.test(e)){c='probe';t='PROBE';}
    else if(/data/.test(e)){c='data';t='DATA';}
    feedBuffer.unshift({ts:now,cls:c,tag:t,msg:e});
  });
  feedBuffer=feedBuffer.slice(0,12);
  document.getElementById('feed-overlay').innerHTML=feedBuffer.map((f,i)=>
    `<div class="frow${i<3?' fresh':''}"><span class="fts">${f.ts}</span><span class="ftag ft-${f.cls}">${f.tag}</span><span>${f.msg.slice(0,40)}</span></div>`
  ).join('');
}

function update(data){
  const m=new Map(nodes.map(n=>[n.id,n]));
  nodes=(data.devices||[]).map(d=>{
    const ex=m.get(d.mac);
    return ex?Object.assign(ex,d,{id:d.mac}):{...d,id:d.mac};
  });
  const ns=new Set(nodes.map(n=>n.id));
  edgeMap=new Map();
  links=(data.edges||[]).filter(([s,t])=>ns.has(s)&&ns.has(t)).slice(0,400)
    .map(([s,t,v])=>{edgeMap.set(s+'-'+t,v);return{source:s,target:t,value:v};});

  buildGraph();

  const s=data.stats||{};
  document.getElementById('s-dev').textContent=s.device_count||0;
  document.getElementById('s-pps').textContent=s.packets_per_sec||0;
  document.getElementById('s-tot').textContent=(s.total_packets||0).toLocaleString();
  const u=s.uptime_secs||0;
  document.getElementById('s-up').textContent=u>3600?Math.floor(u/3600)+'h':u>60?Math.floor(u/60)+'m':u+'s';

  if(data.analysis&&data.analysis!==lastAnalysis){
    lastAnalysis=data.analysis;
    if(selMac){
      const d=nodes.find(n=>n.mac===selMac);
      if(d) showDetail(d);
    }
  }

  pushFeed(data.events||[]);
  rebuildTable();
}

const badge=document.getElementById('conn-badge');
function connect(){
  const ws=new WebSocket('ws://'+location.host+'/ws');
  ws.onopen=()=>{badge.textContent='LIVE';badge.className='badge on';};
  ws.onclose=()=>{badge.textContent='OFFLINE';badge.className='badge off';setTimeout(connect,2000);};
  ws.onmessage=e=>{try{update(JSON.parse(e.data));}catch(err){console.error(err);}};
}
connect();
window.addEventListener('resize',()=>{sim.force('center',d3.forceCenter(W()/2,H()/2)).alpha(0.1).restart();});
</script>
</body>
</html>
