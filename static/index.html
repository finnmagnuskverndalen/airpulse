<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>airpulse</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --black:#000000;--bg:#04040a;--panel:#060610;
  --line:#ffffff0c;--line2:#ffffff1a;--line3:#ffffff2e;
  --t0:#d0d8ff;--t1:#6068a0;--t2:#282840;
  --g:#00ff88;--g2:#00ff8830;--g3:#00ff8812;
  --b:#3d8bff;--b2:#3d8bff30;
  --r:#ff2244;--r2:#ff224430;
  --a:#ffaa00;--a2:#ffaa0030;
  --p:#9955ff;--p2:#9955ff30;
}
html,body{height:100%;overflow:hidden;background:var(--black)}
body{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--t0);display:flex;flex-direction:column}

/* graph takes full screen, UI layers on top */
#gc{position:fixed;inset:0;z-index:0}
#gc canvas{display:block;width:100%!important;height:100%!important}

/* top bar */
#bar{position:fixed;top:0;left:0;right:0;height:42px;z-index:10;background:linear-gradient(180deg,#000000f2 80%,transparent);display:flex;align-items:center;padding:0 16px;gap:14px;border-bottom:1px solid var(--line2)}
.logo{font-size:11px;font-weight:500;letter-spacing:0.22em;color:var(--t0)}
.logo em{color:var(--g);font-style:normal}
.sep{width:1px;height:12px;background:var(--line3)}
.pill{display:flex;align-items:center;gap:5px;font-size:8px;letter-spacing:0.14em;color:var(--t1);border:1px solid var(--line2);padding:3px 8px;border-radius:2px}
.dot{width:5px;height:5px;border-radius:50%}
.live{background:var(--g);animation:dp 1.8s infinite}
.dead{background:var(--r)}
@keyframes dp{0%,100%{opacity:1}50%{opacity:0.1}}
.kv{display:flex;flex-direction:column;align-items:flex-end;min-width:40px}
.kn{font-size:14px;font-weight:400;line-height:1;letter-spacing:0.02em}
.kl{font-size:7px;letter-spacing:0.16em;color:var(--t2);margin-top:2px}
.ml{margin-left:auto}

/* right sidebar */
#side{position:fixed;top:42px;right:0;bottom:100px;width:220px;z-index:10;background:linear-gradient(270deg,#000000f5 60%,#00000080);border-left:1px solid var(--line2);display:flex;flex-direction:column;overflow:hidden}
.sh{padding:7px 12px 5px;font-size:7px;letter-spacing:0.2em;color:var(--t2);border-bottom:1px solid var(--line);flex-shrink:0}
#analyst{font-size:10px;line-height:1.6;color:var(--t1);padding:6px 12px 8px;border-bottom:1px solid var(--line);flex-shrink:0}
.cur{display:inline-block;width:1.5px;height:9px;background:var(--g);animation:bk 1s step-end infinite;vertical-align:middle;margin-left:1px}
@keyframes bk{50%{opacity:0}}
.al{display:flex;gap:5px;padding:3px 12px;align-items:flex-start;border-bottom:1px solid var(--line)}
.al:last-child{border-bottom:none}
.ab{font-size:7px;padding:1px 4px;border-radius:1px;font-weight:500;letter-spacing:0.08em;flex-shrink:0;margin-top:2px}
.ab-HIGH{color:var(--r);border:1px solid var(--r2)}
.ab-MEDIUM{color:var(--a);border:1px solid var(--a2)}
.ab-LOW,.ab-INFO,.ab-NEW{color:var(--g);border:1px solid var(--g2)}
.am{font-size:9px;color:var(--t1);line-height:1.4}
#fw{flex:1;overflow-y:auto;scrollbar-width:none}
#fw::-webkit-scrollbar{display:none}
.fr{display:flex;gap:5px;padding:2px 12px;border-bottom:1px solid var(--line);align-items:baseline}
.fr:last-child{border-bottom:none}
.fts{font-size:8px;color:var(--t2);white-space:nowrap;flex-shrink:0}
.fm{font-size:9px;color:var(--t1);line-height:1.35;word-break:break-all}
.ft{font-size:7px;padding:1px 3px;border-radius:1px;font-weight:500;letter-spacing:0.06em;margin-right:3px}
.ft-probe{color:var(--a);border:1px solid var(--a2)}
.ft-data{color:var(--b);border:1px solid var(--b2)}
.ft-deauth{color:var(--r);border:1px solid var(--r2)}
.ft-new{color:var(--g);border:1px solid var(--g2)}
.ft-beacon{color:var(--p);border:1px solid var(--p2)}
.ft-mgmt,.ft-ctrl{color:var(--t2);border:1px solid var(--line2)}

/* bottom table */
#bot{position:fixed;bottom:0;left:0;right:0;height:100px;z-index:10;background:linear-gradient(0deg,#000000f8 80%,transparent);border-top:1px solid var(--line2);display:flex;flex-direction:column}
.bh{padding:4px 16px;display:flex;align-items:center;flex-shrink:0}
.bt{font-size:7px;letter-spacing:0.2em;color:var(--t2)}
#tw{overflow-y:auto;flex:1;scrollbar-width:none}
#tw::-webkit-scrollbar{display:none}
table{width:100%;border-collapse:collapse}
thead th{padding:2px 16px;text-align:left;font-size:7px;letter-spacing:0.12em;color:var(--t2);border-bottom:1px solid var(--line);background:transparent;position:sticky;top:0}
tbody tr{border-bottom:1px solid var(--line);cursor:pointer;transition:background 0.1s}
tbody tr:hover{background:#ffffff06}
tbody tr.hi{background:#3d8bff08;outline:1px solid #3d8bff1a}
tbody tr.fl{background:#ff22440a}
td{padding:2px 16px;color:var(--t1);font-size:9px}
.tm{color:var(--t0)}
.rb{height:2px;background:var(--line2);border-radius:1px;width:28px;display:inline-block;vertical-align:middle;margin-right:4px;overflow:hidden}
.rf{height:100%;border-radius:1px}

/* legend */
#leg{position:fixed;bottom:110px;left:16px;z-index:10;display:flex;gap:14px;pointer-events:none}
.lg{display:flex;align-items:center;gap:4px;font-size:7px;color:var(--t2);letter-spacing:0.1em}
.ld{width:5px;height:5px;border-radius:50%}

/* hint */
#hint{position:fixed;top:52px;left:16px;z-index:10;pointer-events:none;opacity:0.4}
.ht{font-size:7px;letter-spacing:0.12em;color:var(--t2);margin-bottom:2px}
</style>
</head>
<body>

<div id="gc"></div>

<div id="bar">
  <div class="logo">AIR<em>PULSE</em></div>
  <div class="sep"></div>
  <div class="pill"><span class="dot dead" id="ldot"></span><span id="llbl">OFFLINE</span></div>
  <div class="sep"></div>
  <div class="kv"><div class="kn" style="color:var(--b)" id="s-dev">0</div><div class="kl">DEVICES</div></div>
  <div class="kv"><div class="kn" style="color:var(--g)" id="s-pps">0</div><div class="kl">PKT/S</div></div>
  <div class="kv"><div class="kn" id="s-tot">0</div><div class="kl">TOTAL</div></div>
  <div class="kv ml"><div class="kn" style="color:var(--a)" id="s-up">0s</div><div class="kl">UPTIME</div></div>
</div>

<div id="side">
  <div class="sh">AI ANALYST</div>
  <div id="analyst">waiting for data...<span class="cur"></span></div>
  <div class="sh">ALERTS</div>
  <div id="alerts" style="flex-shrink:0"></div>
  <div class="sh">LIVE FEED</div>
  <div id="fw"><div id="feed"></div></div>
</div>

<div id="bot">
  <div class="bh">
    <span class="bt">DEVICE REGISTRY</span>
    <span style="font-size:7px;color:var(--t2);margin-left:auto;letter-spacing:0.1em">scroll · drag · pinch to zoom</span>
  </div>
  <div id="tw">
    <table>
      <thead><tr><th>MAC</th><th>MANUFACTURER</th><th>TYPE</th><th>RSSI</th><th>FRAMES</th><th>SEEN</th><th></th></tr></thead>
      <tbody id="dt"></tbody>
    </table>
  </div>
</div>

<div id="leg">
  <div class="lg"><div class="ld" style="background:#3d8bff"></div>router</div>
  <div class="lg"><div class="ld" style="background:#00ff88"></div>phone/laptop</div>
  <div class="lg"><div class="ld" style="background:#ffaa00"></div>iot</div>
  <div class="lg"><div class="ld" style="background:#ff2244"></div>flagged</div>
</div>

<div id="hint">
  <div class="ht">DRAG — rotate</div>
  <div class="ht">SCROLL — zoom</div>
  <div class="ht">CLICK — inspect</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/3d-force-graph@1/dist/3d-force-graph.min.js"></script>
<script>
const nc = t => ({'Router':'#3d8bff','Phone':'#00ff88','Laptop':'#00ff88','IoT':'#ffaa00'}[t]||'#ff2244');
const nr = d => Math.max(3, Math.min(12, 3 + Math.log2((d.frame_count||1)+1)*1.6));

const gc = document.getElementById('gc');
const W = () => window.innerWidth;
const H = () => window.innerHeight;

const Graph = ForceGraph3D({controlType:'trackball'})(gc)
  .width(W()).height(H())
  .backgroundColor('#000000')
  .showNavInfo(false)
  .nodeLabel(d => `${d.manufacturer||'?'}\n${d.mac||''}\n${(d.frame_count||0).toLocaleString()} frames`)
  .nodeColor(d => d.flagged ? '#ff2244' : nc(d.device_type||'?'))
  .nodeVal(d => nr(d))
  .nodeOpacity(0.92)
  .nodeResolution(12)
  .linkColor(() => '#ffffff0a')
  .linkWidth(d => Math.min(1.5, 0.2 + Math.log2((d.value||1)+1)*0.2))
  .linkOpacity(0.8)
  .linkDirectionalParticles(d => Math.min(3, Math.floor((d.value||0)/6)))
  .linkDirectionalParticleWidth(1.0)
  .linkDirectionalParticleColor(d => (d.value||0) > 10 ? '#ff2244' : '#00ff88')
  .linkDirectionalParticleSpeed(0.005)
  .linkDirectionalArrowLength(0)
  .onNodeClick(node => {
    selMac = node.mac;
    rebuildTable();
    const dist = 80;
    const distRatio = 1 + dist/Math.hypot(node.x||1, node.y||1, node.z||1);
    Graph.cameraPosition({x:(node.x||0)*distRatio, y:(node.y||0)*distRatio, z:(node.z||0)*distRatio}, node, 800);
  })
  .graphData({nodes:[], links:[]});

window.addEventListener('resize', () => Graph.width(W()).height(H()));

let selMac = null, lastAnalysis = '', nodes = [], links = [];

function update(data) {
  const m = new Map(nodes.map(n=>[n.id,n]));
  nodes = (data.devices||[]).map(d => {
    const ex = m.get(d.mac);
    return ex ? Object.assign(ex, d, {id:d.mac}) : {...d, id:d.mac};
  });
  const ns = new Set(nodes.map(n=>n.id));
  links = (data.edges||[]).filter(([s,t])=>ns.has(s)&&ns.has(t)).slice(0,500)
    .map(([s,t,v])=>({source:s,target:t,value:v}));

  Graph.graphData({nodes:[...nodes], links:[...links]});

  const s = data.stats||{};
  document.getElementById('s-dev').textContent = s.device_count||0;
  document.getElementById('s-pps').textContent = s.packets_per_sec||0;
  document.getElementById('s-tot').textContent = (s.total_packets||0).toLocaleString();
  const u = s.uptime_secs||0;
  document.getElementById('s-up').textContent = u>3600?Math.floor(u/3600)+'h '+(Math.floor(u/60)%60)+'m' : u>60?Math.floor(u/60)+'m '+(u%60)+'s' : u+'s';

  const alts = (data.alerts||[]);
  document.getElementById('alerts').innerHTML = alts.slice(-5).reverse()
    .map(a=>`<div class="al"><span class="ab ab-${a.severity}">${a.severity}</span><span class="am">${a.message}${a.mac?' · '+a.mac.slice(-8):''}</span></div>`).join('');

  const evts = data.events||[];
  const now = new Date().toTimeString().slice(0,8);
  document.getElementById('feed').innerHTML = evts.slice(0,60).map(e=>{
    let c='mgmt',t='–';
    if(/DEAUTH|deauth/.test(e)){c='deauth';t='DEAUTH';}
    else if(/probe/.test(e)){c='probe';t='PROBE';}
    else if(/data/.test(e)){c='data';t='DATA';}
    else if(/new/.test(e)){c='new';t='NEW';}
    else if(/beacon/.test(e)){c='beacon';t='BCN';}
    return `<div class="fr"><span class="fts">${now}</span><span class="fm"><span class="ft ft-${c}">${t}</span>${e}</span></div>`;
  }).join('');

  if(data.analysis && data.analysis !== lastAnalysis){
    lastAnalysis = data.analysis;
    const el = document.getElementById('analyst');
    el.innerHTML=''; let i=0;
    const iv = setInterval(()=>{
      if(i<=data.analysis.length){el.innerHTML=data.analysis.slice(0,i)+'<span class="cur"></span>';i+=2;}
      else{el.innerHTML=data.analysis+'<span class="cur"></span>';clearInterval(iv);}
    },14);
  }
  rebuildTable();
}

function rebuildTable(){
  const sorted=[...nodes].sort((a,b)=>(b.frame_count||0)-(a.frame_count||0)).slice(0,80);
  document.getElementById('dt').innerHTML=sorted.map(d=>{
    const pct=Math.min(100,Math.max(0,((d.rssi||0)+100)*2));
    const rc=(d.rssi||0)>-60?'#00ff88':(d.rssi||0)>-75?'#ffaa00':'#ff2244';
    const cls=d.mac===selMac?' class="hi"':d.flagged?' class="fl"':'';
    return `<tr${cls} onclick="selMac='${d.mac}';rebuildTable()">
      <td class="tm">${d.mac}</td>
      <td class="tm">${d.manufacturer||'Unknown'}</td>
      <td style="color:${nc(d.device_type||'?')}">${d.device_type||'Unknown'}</td>
      <td><div class="rb"><div class="rf" style="width:${pct*0.5}%;background:${rc}"></div></div><span>${d.rssi||0}</span></td>
      <td>${(d.frame_count||0).toLocaleString()}</td>
      <td style="color:${(d.last_seen||0)===0?'#00ff88':'#6068a0'}">${d.last_seen||0}s</td>
      <td style="color:#ff2244">${d.flagged?'⚑':''}</td>
    </tr>`;
  }).join('');
}

const ldot=document.getElementById('ldot');
const llbl=document.getElementById('llbl');

function connect(){
  const ws=new WebSocket('ws://'+location.host+'/ws');
  ws.onopen=()=>{ldot.className='dot live';llbl.textContent='LIVE';};
  ws.onclose=()=>{ldot.className='dot dead';llbl.textContent='OFFLINE';setTimeout(connect,2000);};
  ws.onmessage=e=>{try{update(JSON.parse(e.data));}catch(err){console.error(err);}};
}
connect();
</script>
</body>
</html>
